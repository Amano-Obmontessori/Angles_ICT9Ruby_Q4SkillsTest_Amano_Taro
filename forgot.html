<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Username / Password</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      margin: 0;
      height: 100vh;
      background: #f0f2f5;
    }
    .forgot-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      width: 340px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 95%;
      padding: 10px;
      background: #0d6efd;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #0b5ed7;
    }
    .back {
      background: #6c757d;
      margin-top: 10px;
    }
    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="forgot-box">
    <h2>Recover Account</h2>
    <form id="forgotForm">
      <input type="email" id="email" placeholder="Enter your registered email" required>
      <button type="submit">Submit</button>
      <button type="button" class="back" onclick="window.location.href='index.html'">Back to Login</button>
      <p id="message"></p>
    </form>
  </div>

  <script>
    document.getElementById("forgotForm").addEventListener("submit", function(e){
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message");

      if(email){
        message.textContent = "Recovery instructions sent to " + email;
        message.style.color = "green";
      } else {
        message.textContent = "Please enter a valid email.";
        message.style.color = "red";
      }
    });
  </script>
</body>
</html>
