<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile | Student Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: url("LoginBackground.png") no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      display: flex;
      min-height: 100vh;
      transition: 0.3s;
    }
    .sidebar {
      width: 220px;
      background: #343a40;
      color: white;
      padding-top: 20px;
      flex-shrink: 0;
      text-align: center;
      transition: 0.3s;
    }
    .sidebar.hide {
      margin-left: -220px;
    }
    .sidebar img {
      width: 80px;
      margin-bottom: 15px;
      border-radius: 50%;
      border: 2px solid white;
    }
    .sidebar a {
      display: block;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      font-weight: 500;
    }
    .sidebar a:hover,
    .sidebar a.active {
      background: #495057;
    }
    .main-content {
      flex-grow: 1;
      padding: 40px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      margin: 20px;
      transition: margin-left 0.3s;
    }
    .main-content.full {
      margin-left: 0;
    }
    .profile-section {
      display: flex;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
    }
    .avatar-upload {
      text-align: center;
    }
    .avatar-upload img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #343a40;
      margin-bottom: 15px;
      object-fit: cover;
    }
    .info-box {
      flex-grow: 1;
      background: white;
      border: 2px solid #343a40;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .info-box h4 {
      margin-bottom: 20px;
      color: #343a40;
    }
    .info-box p {
      margin: 8px 0;
    }
    footer {
      text-align: right;
      padding: 15px;
      margin-top: 40px;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <img src="Logo.jpg" alt="Portal Logo">
    <h4>Student Portal</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="notebooks.html">Virtual Notebooks</a>
    <a href="tasks.html">Tasks</a>
    <a href="profile.html" class="active">Profile</a>
    <a href="index.html">Logout</a>
  </div>

  <div class="main-content" id="main">
    <div class="mb-3 text-start">
      <button class="btn btn-outline-secondary" onclick="toggleSidebar()">
        <i class="bi bi-layout-sidebar-inset"></i> Toggle Sidebar
      </button>
    </div>

    <h1>Profile</h1>
    <p class="lead">Student Information</p>

    <div class="profile-section">
      <div class="avatar-upload">
        <img id="avatarPreview" src="https://img.icons8.com/ios-filled/100/000000/user.png" alt="Student Avatar">
        <div class="mt-2">
          <input type="file" id="avatarInput" class="form-control">
        </div>
      </div>

      <div class="info-box">
        <h4>Student Information</h4>
        <p><strong>Student ID:</strong> SN123456</p>
        <p><strong>Contact Number:</strong> +639150000001</p>
        <p><strong>Email Address:</strong> delacruz.jr@obmontessori.edu.ph</p>
        <p><strong>Gender:</strong> Male</p>

        <h5 class="mt-4">Change Password</h5>
        <form id="passwordForm">
          <div class="mb-2">
            <input type="password" id="oldPassword" class="form-control" placeholder="Old Password" required>
          </div>
          <div class="mb-2">
            <input type="password" id="newPassword" class="form-control" placeholder="New Password" required>
          </div>
          <div class="mb-2">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm New Password" required>
          </div>
          <button type="submit" class="btn btn-primary">Change Password</button>
          <p id="passwordMessage" class="mt-2"></p>
        </form>
      </div>
    </div>

    <footer>
      © 2026 Student Portal | All Rights Reserved
    </footer>
  </div>

  <script>
    function toggleSidebar(){
      document.getElementById("sidebar").classList.toggle("hide");
      document.getElementById("main").classList.toggle("full");
    }

    document.getElementById("avatarInput").addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById("avatarPreview").src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById("passwordForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const oldPass = document.getElementById("oldPassword").value;
      const newPass = document.getElementById("newPassword").value;
      const confirmPass = document.getElementById("confirmPassword").value;
      const message = document.getElementById("passwordMessage");

      if (oldPass !== "12345") {
        message.textContent = "Old password is incorrect.";
        message.style.color = "red";
      } else if (newPass !== confirmPass) {
        message.textContent = "New passwords do not match.";
        message.style.color = "red";
      } else {
        message.textContent = "Password successfully changed!";
        message.style.color = "green";
      }
    });
  </script>
</body>
</html>
